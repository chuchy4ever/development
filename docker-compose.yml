services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "4000:4000"
    volumes:
      # Source mounted for tsx watch hot-reload
      - .:/app
      # Keep container's node_modules (with compiled native addons)
      - server_node_modules:/app/node_modules
      - server_app_node_modules:/app/apps/server/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
      # Data directory
      - /home/roman/.ceo:/root/.ceo
      # Host home dir — makes /home/roman/projects/* visible inside container for folder picker
      - /home/roman:/home/roman
      # claude CLI from host
      - ${CEO_CLAUDE_BIN:-/home/roman/.nvm/versions/node/v24.14.1/bin/claude}:/usr/local/bin/claude:ro
    environment:
      - CEO_DATA_DIR=/root/.ceo
      - CEO_CLAUDE_BIN=/usr/local/bin/claude
      - PORT=4000

  web:
    image: node:20-alpine
    ports:
      - "5173:5173"
    working_dir: /app
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
    environment:
      - VITE_API_URL=http://server:4000
    depends_on:
      - server
    command: sh -c "npm install --workspace=@ceo/web --workspace=@ceo/shared && npm run dev:web"

volumes:
  server_node_modules:
  server_app_node_modules:
  shared_node_modules:
  web_node_modules:
  web_app_node_modules:
